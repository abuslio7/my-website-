<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر حلا - السعادة في قطعة</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fffafb; margin: 0; padding: 0; padding-bottom: 120px; }
        
        /* شريط التواصل العلوي */
        .top-bar { background-color: #333; color: white; text-align: center; padding: 8px; font-size: 14px; }
        .top-bar a { color: #ff85a2; text-decoration: none; font-weight: bold; }

        header { background: linear-gradient(rgba(255, 133, 162, 0.8), rgba(255, 133, 162, 0.8)), 
                    url('https://images.unsplash.com/photo-1514517604298-cf80e0fb7f1e?auto=format&fit=crop&w=800&q=60');
                background-size: cover; background-position: center; color: white; padding: 50px 20px; text-align: center; }

        .container { display: flex; flex-wrap: wrap; justify-content: center; padding: 30px; max-width: 1200px; margin: auto; }
        
        /* كرت المنتج */
        .product-card { background: white; border-radius: 20px; margin: 15px; width: 260px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s; position: relative; border: 1px solid #eee; }
        .product-card:hover { transform: translateY(-10px); }
        
        /* صور حقيقية */
        .product-img { width: 100%; height: 180px; object-fit: cover; }
        
        .product-info { padding: 20px; text-align: center; }
        .price { color: #d63384; font-size: 1.3em; font-weight: bold; margin: 10px 0; }
        
        .add-btn { background-color: #ff85a2; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; }
        .add-btn:hover { background-color: #f76d8e; }

        /* سلة المشتريات المطورة */
        .cart-panel { position: fixed; bottom: 20px; right: 20px; left: 20px; background: white; border-top: 4px solid #ff85a2; border-radius: 15px; padding: 20px; box-shadow: 0 -5px 25px rgba(0,0,0,0.15); max-width: 500px; margin: auto; z-index: 1000; }
        .cart-items { max-height: 100px; overflow-y: auto; margin-bottom: 10px; border-bottom: 1px dashed #eee; padding-bottom: 10px; }
        .total-area { display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 1.2em; }
        
        .whatsapp-order { background-color: #25d366; color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-size: 0.9em; display: inline-block; }
    </style>
</head>
<body>

<div class="top-bar">
    للتواصل المباشر: <a href="tel:+966532843887">0532843887</a>
</div>

<header>
    <h1 style="margin:0; font-size: 2.5em;">🧁 متجر حلا 🧁</h1>
    <p>أفخم أنواع الدونات والكيك والحلويات</p>
</header>

<div class="container">
    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1551024601-bec78aea704b?auto=format&fit=crop&w=500&q=80" class="product-img" alt="دونات">
        <div class="product-info">
            <span style="font-size: 0.8em; color: #888;">دونات</span>
            <h3>دونات نوتيلا</h3>
            <p class="price">12 ريال</p>
            <button class="add-btn" onclick="addToCart('دونات نوتيلا', 12)">إضافة للسلة</button>
        </div>
    </div>

    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?auto=format&fit=crop&w=500&q=80" class="product-img" alt="كيك">
        <div class="product-info">
            <span style="font-size: 0.8em; color: #888;">كيك</span>
            <h3>كيكة الشوكولاتة</h3>
            <p class="price">45 ريال</p>
            <button class="add-btn" onclick="addToCart('كيكة الشوكولاتة', 45)">إضافة للسلة</button>
        </div>
    </div>

    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1499636136210-6f4ee915583e?auto=format&fit=crop&w=500&q=80" class="product-img" alt="كوكيز">
        <div class="product-info">
            <span style="font-size: 0.8em; color: #888;">حلويات</span>
            <h3>كوكيز كلاسيك</h3>
            <p class="price">10 ريال</p>
            <button class="add-btn" onclick="addToCart('كوكيز كلاسيك', 10)">إضافة للسلة</button>
        </div>
    </div>

    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1533134242443-d4fd215305ad?auto=format&fit=crop&w=500&q=80" class="product-img" alt="تشيز كيك">
        <div class="product-info">
            <span style="font-size: 0.8em; color: #888;">كيك</span>
            <h3>تشيز كيك توت</h3>
            <p class="price">25 ريال</p>
            <button class="add-btn" onclick="addToCart('تشيز كيك توت', 25)">إضافة للسلة</button>
        </div>
    </div>
</div>

<div class="cart-panel" id="cartPanel">
    <div style="font-weight: bold; margin-bottom: 10px;">🛒 طلبياتك:</div>
    <div id="cart-list" class="cart-items">لم تضف شيئاً بعد..</div>
    <div class="total-area">
        <div>المجموع: <span id="total-price">0</span> ريال</div>
        <a id="whatsappLink" href="#" target="_blank" class="whatsapp-order" style="display:none;">إتمام الطلب (واتساب)</a>
    </div>
</div>

<script>
    let cart = [];
    let total = 0;

    function addToCart(name, price) {
        cart.push({name, price});
        total += price;
        updateUI();
    }

    function updateUI() {
        const list = document.getElementById('cart-list');
        const totalDisp = document.getElementById('total-price');
        const waLink = document.getElementById('whatsappLink');
        
        if (cart.length === 0) {
            list.innerHTML = "السلة فارغة..";
            waLink.style.display = "none";
        } else {
            list.innerHTML = cart.map(item => `<div>• ${item.name} (${item.price} ريال)</div>`).join('');
            waLink.style.display = "inline-block";
            
            // تجهيز نص رسالة الواتساب
            let message = "مرحباً متجر حلا، أرغب في طلب:\n";
            cart.forEach(item => message += `- ${item.name}\n`);
            message += `\nالمجموع: ${total} ريال`;
            
            waLink.href = `https://wa.me/966532843887?text=${encodeURIComponent(message)}`;
        }
        
        totalDisp.innerText = total;
    }
</script>

</body>
</html>
